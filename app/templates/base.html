<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0f172a",
              sky: "#dbeafe",
              cyan: "#0f766e",
              sand: "#f8fafc"
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-sand via-white to-sky text-ink">
    <div class="mx-auto max-w-6xl px-6 py-8">
      <header class="mb-10 flex flex-col gap-4 border-b border-slate-200 pb-6 md:flex-row md:items-center md:justify-between">
        <div>
          <p class="text-sm font-medium uppercase tracking-[0.3em] text-cyan">OpenAlex analytics</p>
          <h1 class="mt-2 text-3xl font-bold">{{ app_name }}</h1>
        </div>
        <nav class="flex gap-3 text-sm font-medium text-slate-600">
          <a href="/" class="rounded-full bg-white px-4 py-2 shadow-sm ring-1 ring-slate-200">Главная</a>
          <a href="/docs" class="rounded-full bg-white px-4 py-2 shadow-sm ring-1 ring-slate-200">Swagger</a>
          <a href="/api/v1/health" class="rounded-full bg-white px-4 py-2 shadow-sm ring-1 ring-slate-200">Health</a>
        </nav>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
